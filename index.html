<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Moozik Player</title>
        <script src="https://unpkg.com/@strudel/web@1.0.3"></script>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gradient-to-br from-purple-900 via-indigo-900 to-blue-900 min-h-screen flex items-center justify-center p-4">
        <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-8 border border-white/20 max-w-sm w-full">
            <!-- Title -->
            <h1 class="text-3xl font-bold text-white text-center mb-8">Moozik</h1>
            
            <!-- Track Selection -->
            <div class="mb-6">
                <label for="trackSelect" class="block text-purple-200 text-sm mb-2">Select Track</label>
                <select id="trackSelect" class="w-full bg-white/20 text-white border border-white/30 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <!-- Options populated dynamically -->
                </select>
            </div>

            <!-- Controls -->
            <div class="flex gap-4 justify-center">
                <!-- Play Button -->
                <button id="play" class="flex-1 bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white font-semibold py-3 px-6 rounded-lg transition-all hover:scale-105 shadow-lg flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"></path>
                    </svg>
                    Play
                </button>

                <!-- Stop Button -->
                <button id="stop" class="flex-1 bg-white/10 hover:bg-white/20 text-white font-semibold py-3 px-6 rounded-lg transition-all hover:scale-105 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 6h12v12H6z"></path>
                    </svg>
                    Stop
                </button>
            </div>
        </div>

        <script src="script.js" type="module"></script>
    </body>
</html>
